services:
  app:
    image: node:22-alpine
    command: sh -c "npm install -g pnpm && rm -rf node_modules && pnpm install && pnpm dev"
    volumes:
      - ./backend/src:/app/src
    working_dir: /app

  frontend:
    image: node:22-alpine
    command: sh -c "npm install -g pnpm && rm -rf node_modules && pnpm install && pnpm dev --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend/src:/app/src
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - CHOKIDAR_USEPOLLING=true
